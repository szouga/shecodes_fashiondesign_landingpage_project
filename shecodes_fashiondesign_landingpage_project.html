<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Design ~ My Hobby</title>
    <style>
      body {
        background: tan;
      }
      h1 {
        text-align: center;
      }
      h2 {
        text-align: center;
      }
      img {
        max-width: 100%;
      }
      .testing {
        display: block;
        margin: 0 auto;
        border: 1px thin;
        background: white;
        color: white;
        font-family:
          "Didot", "Bodoni MT", "Libre Didot", "Noto Serif Display", serif;
        font-size: 20px;
        border-radius: 6px;
        padding: 10px 15px;
        transition: all 600ms ease-in-out;
      }
      .testing:hover {
        background: tan;
        color: black;
        transform: scale(1.4, 1.2);
        font-family:
          "Didot", "Bodoni MT", "Libre Didot", "Noto Serif Display", serif;
      }
      .container {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        border-radius: 10px;
        border: 10px groove;
        border-image: linear-gradient(to right, #2c2c2c, tan 50%) 1;
        font-family: "EB Garamond", serif;
        color: #2c2c2c; /* Muted, dark tones for the academia style */
        background-color: #f4f1ea; /* Parchment-like background */
        transition: all 0.3s ease;
      }
      footer {
        text-align: center;
        margin: 10px 0;
        font-size: 18px;
        transition: all 0.3s ease;
      }
      .theme-button {
        display: block;
        margin: 0 auto;
        font-size: 12px;
        background: black;
        color: white;
        padding: 5px 8px;
      }
      .theme-button:hover {
        background: #2c2c2c;
        color: white;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-gap: 1px;
      }
      .grid img {
        border-radius: 18px;
      }
      .change-theme {
        background: linear-gradient(to right, #2c2c2c 50%, tan);
      }
      .change-theme .container {
        border: 10px groove; /*required for gradient*/
        border-image: linear-gradient(to right, tan 50%, #2c2c2c) 1;
        border-image-slice: 1; /*ensures gradient fills border */
        transition: all 0.3s ease;
      }
      .change-theme footer {
        background: white;
        display: block;
        margin: 10px 90px 20px;
        padding: 10px 4px 20px;
        border-radius: 4px;
      }
      .change-theme footer a {
        color: tan;
      }
      .change-theme .theme-button {
        background: white;
        color: black;
      }
      .change-theme .theme-button:hover {
        background: tan;
        color: white;
      }
    </style>
    <button class="theme-button">Dark Theme</button>
    <!--^switches the color theme-->
  </head>
  <body>
    <!--Build a landing page about your hobby: Fashion Design -->
    <div class="container">

      <p><em>*wear layers from top left to bottom right</em></p>
      <button class="testing">Fashion is passion</button>

    <footer>
      <small
        ><em
          >Coded by

            style="color: brown"
            >Sophie Clement Zouga Ndong</a

      >
    </footer>
    <script>
      let themeButton = document.querySelector(".theme-button");
      let body = document.querySelector("body");
      let footer = document.querySelector("footer");
      let changeThemeContainer = document.querySelector(".container");
      function changeTheme() {
        body.classList.toggle("change-theme");

        if (body.classList.contains("change-theme")) {
          themeButton.innerHTML = `Light Theme`;
        } else {
          themeButton.innerHTML = `Dark Theme`;
        }
      }
      themeButton.addEventListener("click", changeTheme);
    </script>
  </body>
</html>
